# Use C-r to reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'

# Material Darker
set -g status-style bg='#2d2d2d',fg='#eeffff'
set -g status-left '#[bg=#82aaff,fg=#212121,bold] #S '
set -g status-right '#[bg=#82aaff,fg=#212121,bold] %H:%M '
set -g window-status-format '#[fg=#546e7a] #I:#W '
set -g window-status-current-format '#[bg=#3d3d3d,fg=#82aaff,bold] #I:#W '
set -g window-status-current-style 'fg=#82aaff,bold'
set -g window-status-style 'fg=#546e7a'
set -g pane-border-style 'fg=#37474f'
set -g pane-active-border-style 'fg=#82aaff'
set -g status-left-length 20
set -g status-right-length 20

# Window and pane index starting with 1
set -g base-index 1
set -g pane-base-index 1

# Status bar on top
# set -g status-position top

# Separators to make it look more polished
set -g status-left '#[bg=#82aaff,fg=#212121,bold] #S #[bg=#2d2d2d,fg=#82aaff]'
set -g status-right '#[fg=#82aaff]#[bg=#82aaff,fg=#212121,bold] #{?client_prefix,🧉 ,}#(curl -s "https://api.open-meteo.com/v1/forecast?latitude=41.29&longitude=-73.84&current=temperature_2m&temperature_unit=fahrenheit&forecast_days=1" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(\"❄️ \"+str(round(d[\"current\"][\"temperature_2m\"]))+\"°F\")") #{battery_icon}#{battery_percentage} 🕐 %H:%M '
set -g status-interval 3600
set -g status-right-length 60

# Mouse support
set -g mouse on

# Don't rename windows automatically
set -g allow-rename off

# Increase scrollback buffer
set -g history-limit 10000

# Highlight window with activity
set -g monitor-activity on
set -g visual-activity off

run '~/.config/tmux/plugins/tpm/tpm'
